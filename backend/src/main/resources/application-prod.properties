# ===== Production profile =====
# Overrides application.properties defaults for production deployment

# NEVER let Hibernate modify schema in production
spring.jpa.hibernate.ddl-auto=validate

# Enable SQL logging only for slow queries in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Production-grade connection pool
spring.datasource.hikari.maximum-pool-size=40
spring.datasource.hikari.minimum-idle=10

# Disable Flyway baseline-on-migrate in production (schema should be fully migrated)
spring.flyway.baseline-on-migrate=false

# Cache: use caffeine in production (distributed if needed)
spring.cache.type=caffeine

# CORS must be explicitly configured in production
# cors.allowed-origins must be set via CORS_ORIGINS env var

# Upload: use S3 or other cloud storage in production
# upload.url-base should be set to the production CDN/API URL
