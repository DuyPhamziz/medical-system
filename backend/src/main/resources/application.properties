spring.application.name=backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
# Nếu sau này deploy/prod: set biến SPRING_PROFILES_ACTIVE=prod
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/med_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:hp12345}

# ===== HikariCP Connection Pool =====
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:20}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# SQL logging - disabled by default for performance; enable with dev profile
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# ===== Caching =====
spring.cache.type=${CACHE_TYPE:simple}
spring.cache.cache-names=forms,clinicalScales,formPermissions
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s

# ===== Flyway =====
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET:change-this-secret-key-to-256-bit-minimum-change-this-secret}
jwt.access-token-expiration-ms=${JWT_ACCESS_EXP_MS:3600000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXP_MS:604800000}

app.seed.admin.enabled=${SEED_ADMIN_ENABLED:false}
app.seed.admin.username=${SEED_ADMIN_USERNAME:System Admin}
app.seed.admin.email=${SEED_ADMIN_EMAIL:}
app.seed.admin.password=${SEED_ADMIN_PASSWORD:}
app.seed.admin.doctor-username=${SEED_DOCTOR_USERNAME:Dr. Demo}
app.seed.admin.doctor-email=${SEED_DOCTOR_EMAIL:}
app.seed.admin.doctor-password=${SEED_DOCTOR_PASSWORD:}
app.seed.admin.patient-username=${SEED_PATIENT_USERNAME:Patient Demo}
app.seed.admin.patient-email=${SEED_PATIENT_EMAIL:}
app.seed.admin.patient-password=${SEED_PATIENT_PASSWORD:}

# File Upload Configuration
upload.base-path=${UPLOAD_BASE_PATH:uploads}
upload.max-file-size=${UPLOAD_MAX_SIZE:10485760}
upload.allowed-mime-types=${UPLOAD_MIME_TYPES:application/pdf,image/jpeg,image/png,image/gif,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/csv}
upload.url-base=${UPLOAD_URL_BASE:http://localhost:8080/api/forms}

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600